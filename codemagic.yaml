workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd app
          flutter pub get

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.thomaspeterson.bikerouter" --type IOS_APP_STORE --create
          keychain add-certificates
          cd app
          xcode-project use-profiles --project=ios/Runner.xcodeproj

      - name: Get latest build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "com.thomaspeterson.bikerouter" || echo 0)
          BUILD_NUMBER=$((LATEST + 1))
          echo "Latest TestFlight build: $LATEST → Next: $BUILD_NUMBER"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV

      - name: Build IPA
        script: |
          cd app
          echo "Building with build number: $BUILD_NUMBER"
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - app/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true

  ios-debug:
    name: iOS Debug Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd app
          flutter pub get

      - name: Build (no signing)
        script: |
          cd app
          flutter build ios --debug --simulator

  android-release:
    name: Android Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
      groups:
        - android_signing
    scripts:
      - name: Install dependencies
        script: |
          cd app
          flutter pub get

      - name: Build APK
        script: |
          cd app
          flutter build apk --release

      - name: Build App Bundle
        script: |
          cd app
          flutter build appbundle --release

    artifacts:
      - app/build/app/outputs/flutter-apk/*.apk
      - app/build/app/outputs/bundle/release/*.aab
