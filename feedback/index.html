<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feedback · Wegwiesel</title>
  <link rel="icon" href="/icons/Icon-192.png" />
  <style>
    :root {
      --bg: #1a1a2e;
      --bg2: #222244;
      --accent: #4fc3f7;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.55);
      --border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.5;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 64px; }
    a { color: var(--accent); text-decoration: none; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .subtitle { color: var(--muted); font-size: 14px; margin: 0 0 20px; }
    .back { display: inline-block; margin-bottom: 12px; font-size: 13px; color: var(--muted); }
    form {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    input[type="text"], textarea {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      resize: vertical;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .row { margin-bottom: 10px; }
    .honeypot { position: absolute; left: -5000px; }
    button {
      background: var(--accent);
      color: #000;
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    .msg { color: var(--muted); font-size: 13px; margin-top: 8px; min-height: 18px; }
    .msg.err { color: #ef9a9a; }
    .msg.ok { color: #a5d6a7; }
    ul.list { list-style: none; padding: 0; margin: 0; }
    li.item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .vote {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 56px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .vote:hover { border-color: var(--accent); }
    .vote.voted { border-color: var(--accent); background: rgba(79,195,247,0.12); }
    .vote .arrow { font-size: 14px; color: var(--accent); }
    .vote .count { font-weight: 600; font-size: 16px; }
    .item-body { flex: 1; min-width: 0; }
    .title { font-weight: 600; margin: 0; word-wrap: break-word; }
    .desc { color: rgba(255,255,255,0.75); margin: 4px 0 0; white-space: pre-wrap; word-wrap: break-word; font-size: 14px; }
    .date { color: var(--muted); font-size: 12px; margin-top: 6px; }
    .empty { color: var(--muted); text-align: center; padding: 32px; }
    .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .tab {
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
    }
    .tab.active { color: #000; background: var(--accent); border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← wegwiesel.app</a>
    <h1>Feedback & Feature-Wünsche</h1>
    <p class="subtitle">Sag uns, was dir fehlt oder was hakt. Upvote, was dich am meisten stört.</p>

    <form id="form">
      <div class="row">
        <label for="title">Titel (3–140 Zeichen)</label>
        <input id="title" type="text" maxlength="140" required />
      </div>
      <div class="row">
        <label for="desc">Beschreibung (optional)</label>
        <textarea id="desc" rows="3" maxlength="2000"></textarea>
      </div>
      <input class="honeypot" type="text" id="website" tabindex="-1" autocomplete="off" aria-hidden="true" />
      <button id="submit" type="submit">Absenden</button>
      <div id="msg" class="msg"></div>
    </form>

    <div class="tabs">
      <span class="tab active" data-sort="top">Top</span>
      <span class="tab" data-sort="new">Neu</span>
    </div>

    <ul id="list" class="list"></ul>
  </div>

  <script>
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    const list = document.getElementById('list');
    const submit = document.getElementById('submit');
    const titleEl = document.getElementById('title');
    const descEl = document.getElementById('desc');
    const websiteEl = document.getElementById('website');
    let state = { items: [], sort: 'top' };

    async function load() {
      const r = await fetch('/api/feedback');
      state.items = await r.json();
      render();
    }

    function render() {
      const items = state.items.slice();
      if (state.sort === 'new') {
        items.sort((a, b) => b.id - a.id);
      } else {
        items.sort((a, b) => b.votes - a.votes || b.id - a.id);
      }
      if (items.length === 0) {
        list.innerHTML = '<li class="empty">Noch kein Feedback. Sei der erste!</li>';
        return;
      }
      list.innerHTML = '';
      for (const f of items) {
        const li = document.createElement('li');
        li.className = 'item';
        const vote = document.createElement('div');
        vote.className = 'vote' + (f.voted ? ' voted' : '');
        vote.innerHTML = '<span class="arrow">▲</span><span class="count">' + f.votes + '</span>';
        vote.onclick = () => toggleVote(f.id);
        const body = document.createElement('div');
        body.className = 'item-body';
        const title = document.createElement('p');
        title.className = 'title';
        title.textContent = f.title;
        body.appendChild(title);
        if (f.description) {
          const d = document.createElement('p');
          d.className = 'desc';
          d.textContent = f.description;
          body.appendChild(d);
        }
        const date = document.createElement('div');
        date.className = 'date';
        date.textContent = new Date(f.createdAt).toLocaleDateString('de-DE', { year: 'numeric', month: 'short', day: 'numeric' });
        body.appendChild(date);
        li.appendChild(vote);
        li.appendChild(body);
        list.appendChild(li);
      }
    }

    async function toggleVote(id) {
      const r = await fetch('/api/feedback/' + id + '/vote', { method: 'POST' });
      if (!r.ok) return;
      const out = await r.json();
      const item = state.items.find(x => x.id === id);
      if (item) {
        item.voted = out.voted;
        item.votes += out.voted ? 1 : -1;
      }
      render();
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'msg';
      msg.textContent = '';
      submit.disabled = true;
      try {
        const r = await fetch('/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: titleEl.value,
            description: descEl.value,
            website: websiteEl.value,
          }),
        });
        const out = await r.json();
        if (!r.ok) throw new Error(out.error || 'Fehler');
        msg.className = 'msg ok';
        msg.textContent = 'Danke! Dein Feedback ist eingetragen.';
        titleEl.value = '';
        descEl.value = '';
        await load();
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = err.message;
      } finally {
        submit.disabled = false;
      }
    });

    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        state.sort = t.dataset.sort;
        render();
      });
    });

    load();
  </script>
</body>
</html>
