<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b27040"/>
      <stop offset="100%" stop-color="#7d4f25"/>
    </linearGradient>
    <linearGradient id="post" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6a4218"/>
      <stop offset="50%" stop-color="#a26a36"/>
      <stop offset="100%" stop-color="#6a4218"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle map hint behind -->
  <g opacity="0.06" stroke="#4fc3f7" stroke-width="3" fill="none">
    <line x1="80" y1="220" x2="944" y2="220"/>
    <line x1="80" y1="520" x2="944" y2="520"/>
    <line x1="80" y1="820" x2="944" y2="820"/>
    <line x1="220" y1="80" x2="220" y2="944"/>
    <line x1="804" y1="80" x2="804" y2="944"/>
    <path d="M80 380 Q300 340 540 400 Q740 460 944 420"/>
    <path d="M80 700 Q280 660 480 720 Q700 780 944 740"/>
  </g>

  <!-- Post (vertical wooden pole) -->
  <rect x="478" y="300" width="68" height="640" fill="url(#post)" rx="8"/>
  <rect x="478" y="300" width="68" height="640" fill="none" stroke="#3a2210" stroke-width="4" rx="8"/>
  <!-- Wood-grain hint -->
  <line x1="498" y1="320" x2="498" y2="920" stroke="#3a2210" stroke-width="2" opacity="0.3"/>
  <line x1="528" y1="320" x2="528" y2="920" stroke="#3a2210" stroke-width="2" opacity="0.3"/>

  <!-- Top marker (location pin) -->
  <g transform="translate(512, 240)">
    <path d="M0 -60 C-46 -60 -64 -30 -64 -8 C-64 28 0 80 0 80 C0 80 64 28 64 -8 C64 -30 46 -60 0 -60Z"
          fill="#ef5350" stroke="#b6362f" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="0" cy="-14" r="18" fill="white"/>
  </g>

  <!-- Top arrow plank (pointing right) -->
  <g transform="translate(0, 430)">
    <path d="M170 -52 L780 -52 L860 0 L780 52 L170 52 Z"
          fill="url(#wood)" stroke="#3a2210" stroke-width="5" stroke-linejoin="round"/>
    <line x1="200" y1="-30" x2="780" y2="-30" stroke="#3a2210" stroke-width="2" opacity="0.35"/>
    <line x1="200" y1="30" x2="780" y2="30" stroke="#3a2210" stroke-width="2" opacity="0.35"/>
    <!-- accent stripe -->
    <rect x="220" y="-12" width="540" height="24" fill="#4fc3f7" opacity="0.18" rx="3"/>
  </g>

  <!-- Middle arrow plank (pointing left, slightly longer) -->
  <g transform="translate(0, 580)">
    <path d="M854 -52 L244 -52 L164 0 L244 52 L854 52 Z"
          fill="url(#wood)" stroke="#3a2210" stroke-width="5" stroke-linejoin="round"/>
    <line x1="824" y1="-30" x2="244" y2="-30" stroke="#3a2210" stroke-width="2" opacity="0.35"/>
    <line x1="824" y1="30" x2="244" y2="30" stroke="#3a2210" stroke-width="2" opacity="0.35"/>
    <rect x="264" y="-12" width="540" height="24" fill="#ffc107" opacity="0.22" rx="3"/>
  </g>

  <!-- Bottom arrow plank (pointing right, shorter) -->
  <g transform="translate(0, 730)">
    <path d="M170 -46 L660 -46 L730 0 L660 46 L170 46 Z"
          fill="url(#wood)" stroke="#3a2210" stroke-width="5" stroke-linejoin="round"/>
    <line x1="200" y1="-26" x2="660" y2="-26" stroke="#3a2210" stroke-width="2" opacity="0.35"/>
    <line x1="200" y1="26" x2="660" y2="26" stroke="#3a2210" stroke-width="2" opacity="0.35"/>
    <rect x="220" y="-10" width="420" height="20" fill="#81c784" opacity="0.22" rx="3"/>
  </g>
</svg>
