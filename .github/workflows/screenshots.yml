name: Screenshots

# Generates up-to-date store screenshots on the self-hosted Mac runner and
# attaches them as downloadable artifacts. Runs alongside release.yml on every
# push to main that touches the app, so a release build and fresh screenshots
# are produced together. Can also be triggered manually or on a GitHub Release.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'scripts/**'
      - '.github/workflows/screenshots.yml'
  workflow_dispatch:
  release:
    types: [published]

jobs:
  ios:
    name: iOS — Phone + Watch
    runs-on: [self-hosted, macOS]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      # iPhone phone shots are rendered from the deployed web build at 6.9"
      # resolution (1290×2796). True iOS-simulator capture is impossible on the
      # GPU-less Proxmox macOS VM (the simulator needs Metal → renders black);
      # scripts/ios-screenshots.sh remains in the repo for when/if GPU
      # passthrough is set up. Note: web render shows whatever is live.
      - name: Phone screenshots (web runner, iPhone 6.9")
        continue-on-error: true
        working-directory: scripts/screenshot-runner
        env:
          SHOT_OUT: ${{ github.workspace }}/app/build/screenshots/ios
          SHOT_W: "1290"
          SHOT_H: "2796"
        run: |
          npm ci || npm install
          npx playwright install chromium
          node run.mjs

      # Watch screenshots: the watch app's env-gated screenshot mode shows one
      # seeded screen, captured via `simctl io screenshot`. The watch is native
      # SwiftUI, which renders fine under the simulator's software rendering.
      - name: Watch screenshots (simctl)
        id: watch
        continue-on-error: true
        working-directory: app/ios
        env:
          SHOT_OUT: ${{ github.workspace }}/app/build/screenshots/watch
        run: bash ../../scripts/watch-screenshots.sh

      - name: Upload iOS screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: app/build/screenshots/**
          if-no-files-found: warn
          retention-days: 30

  android:
    name: Android — Phone + Wear
    runs-on: [self-hosted, macOS]
    timeout-minutes: 30
    needs: ios          # serialize on the single Mac runner
    if: always()
    steps:
      - uses: actions/checkout@v4

      # Paparazzi 2.0.0-alpha05 (the AGP 8.13 build) requires a Java 21 runtime;
      # the runner's default is Java 17. This sets JAVA_HOME for the Gradle steps
      # below (the web-runner and pub-get steps are unaffected).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Generates app/android/local.properties (flutter.sdk), which
      # settings.gradle.kts requires before the :wear Gradle build can run.
      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      # Phone shots come from the deployed web build (wegwiesel.app) rendered
      # at phone resolution — no device or emulator needed. Note: this shows
      # whatever is currently live, not necessarily this commit.
      - name: Phone screenshots (web runner)
        id: phone
        continue-on-error: true
        working-directory: scripts/screenshot-runner
        env:
          SHOT_OUT: ${{ github.workspace }}/app/build/screenshots/android-phone
        run: |
          npm ci || npm install
          npx playwright install chromium
          node run.mjs

      # Wear shots are rendered from Compose @Preview composables without an
      # emulator. Best-effort so a Gradle hiccup doesn't lose the phone shots.
      - name: Wear screenshots (Compose preview)
        id: wear
        continue-on-error: true
        working-directory: app/android
        env:
          SHOT_OUT: ${{ github.workspace }}/app/build/screenshots/wear
        run: bash ../../scripts/wear-screenshots.sh

      - name: Upload Android screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshots
          path: app/build/screenshots/**
          if-no-files-found: warn
          retention-days: 30
