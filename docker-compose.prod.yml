services:
  brouter:
    build:
      context: .
      dockerfile: Dockerfile.brouter
    volumes:
      - /opt/wegwiesel/segments4:/segments4
      - /opt/wegwiesel/customprofiles:/brouter/customprofiles
    restart: unless-stopped
    expose:
      - "17777"

  overpass:
    image: wiktorn/overpass-api
    environment:
      OVERPASS_META: "yes"
      OVERPASS_MODE: "init"
      OVERPASS_PLANET_URL: "file:///planet/germany-latest.osm.pbf"
      OVERPASS_PLANET_PREPROCESS: 'mv /db/planet.osm.bz2 /db/planet.osm.pbf && osmium cat -F osm.pbf -f osm.bz2 -o /db/planet.osm.bz2 /db/planet.osm.pbf && rm /db/planet.osm.pbf'
      OVERPASS_DIFF_URL: "https://download.geofabrik.de/europe/germany-updates/"
      OVERPASS_FLUSH_SIZE: 4
      OVERPASS_RULES_LOAD: 10
      OVERPASS_UPDATE_SLEEP: 3600
    volumes:
      - /opt/wegwiesel/overpass_db:/db
      - /opt/wegwiesel/pbf:/planet:ro
    restart: unless-stopped
    expose:
      - "80"

  feedback:
    build:
      context: ./feedback
    environment:
      DB_PATH: /data/feedback.db
      IP_SALT: ${FEEDBACK_IP_SALT:-change-me}
      ADMIN_TOKEN: ${FEEDBACK_ADMIN_TOKEN:-}
      LISTEN_ADDR: ":8080"
    volumes:
      - /opt/wegwiesel/feedback-data:/data
    restart: unless-stopped
    expose:
      - "8080"

  share:
    build:
      context: ./share
    environment:
      DB_PATH: /data/share.db
      IP_SALT: ${SHARE_IP_SALT:-change-me}
      LISTEN_ADDR: ":8080"
    volumes:
      - /opt/wegwiesel/share-data:/data
    restart: unless-stopped
    expose:
      - "8080"

  tracking:
    build:
      context: ./tracking
    environment:
      LISTEN_ADDR: ":8080"
    restart: unless-stopped
    expose:
      - "8080"

  charging-prices:
    build:
      context: ./server/charging-prices
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      MOBILITHEK_CERT: /secrets/mobilithek.crt
      MOBILITHEK_KEY: /secrets/mobilithek.key
      SUBSCRIPTIONS: /config/subscriptions.txt
      OUT_FILE: /data/charging_prices.json
      DATA_FILE: /data/charging_prices.json
      FETCH_INTERVAL_HOURS: "24"
      # Live status (dyn) feeds — polled every STATUS_INTERVAL seconds.
      STATUS_SUBSCRIPTIONS: /config/status_subscriptions.txt
      STATUS_FILE: /data/charging_status.json
      STORE_FILE: /data/charging_status_store.json
      STATUS_INTERVAL: "150"
      # Hand-maintained charging-card tariff table (live-editable on the host).
      TARIFFS_FILE: /config/tariffs.json
    volumes:
      - /opt/wegwiesel/charging-prices/secrets:/secrets:ro
      - /opt/wegwiesel/charging-prices/subscriptions.txt:/config/subscriptions.txt:ro
      - /opt/wegwiesel/charging-prices/status_subscriptions.txt:/config/status_subscriptions.txt:ro
      - /opt/wegwiesel/charging-prices/tariffs.json:/config/tariffs.json:ro
      - /opt/wegwiesel/charging-prices-data:/data
    restart: unless-stopped
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - /opt/wegwiesel/app:/srv/web:ro
      - /opt/wegwiesel/segments4:/srv/segments:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - brouter
      - overpass
      - feedback
      - share
      - tracking
      - charging-prices

volumes:
  caddy_data:
  caddy_config:
