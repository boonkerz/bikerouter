services:
  brouter:
    build:
      context: .
      dockerfile: Dockerfile.brouter
    volumes:
      - ./segments4:/segments4
      - ./customprofiles:/brouter/customprofiles
    restart: unless-stopped
    expose:
      - "17777"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./web:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - brouter

volumes:
  caddy_data:
  caddy_config:
